<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Real experiences with birth control and medications, beyond the official description">
  <meta name="theme-color" content="#8BC9B0">
  
  <title>Intake</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="public/manifest.json">
  
  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" href="public/icons/icon-192x192.png">
  
  <!-- Styles -->
  <link rel="stylesheet" href="/src/styles/variables.css">
  <link rel="stylesheet" href="/src/styles/global.css">
  <link rel="stylesheet" href="/src/styles/components.css">
  
  <!-- iOS specific -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="BC Community">
</head>
<body>
  <!-- Top Navigation Bar -->
  <nav id="top-nav"></nav>
  
  <!-- Main App Container -->
  <main id="app">
    <!-- Dynamic content loads here -->
    <div class="container">
      <div style="text-align: center; padding: 60px 20px;">
        <div class="spinner" style="margin: 0 auto 24px;"></div>
        <p class="text-secondary">Loading...</p>
      </div>
    </div>
  </main>
  
  <!-- Bottom Navigation Bar -->
  <nav id="bottom-nav"></nav>
  
  <!-- Toast/Alert Container -->
  <div id="toast-container"></div>
  
  <!-- Modal Container -->
  <div id="modal-container"></div>
  
  <!-- Scripts -->
  <script type="module" src="/src/js/app.js"></script>
  
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('public/sw.js')
          .then(registration => {
            console.log('ServiceWorker registered:', registration);
          })
          .catch(error => {
            console.log('ServiceWorker registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
